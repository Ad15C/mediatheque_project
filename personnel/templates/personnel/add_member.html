{% extends 'personnel/base.html' %}

{% block content %}
  <h2>Ajouter un Membre</h2>

      {% if messages %}
        <div class="messages">
          {% for message in messages %}
            <p class="message">{{ message }}</p>
          {% endfor %}
        </div>
      {% endif %}

      <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Ajouter</button>
      </form>
{% endblock %}
