{% extends 'personnel/base.html' %}

{% block content %}
  <h2>Ajouter un Membre</h2>

      {% if messages %}
    <div class="messages">
        {% for message in messages %}
            <div class="message {{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}


      <form method="POST" action="{% url 'add_member' %}">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Ajoutez le membre</button>
      </form>


{% endblock %}
